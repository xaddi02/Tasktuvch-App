<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskTUVCH - Chat con Ajolote</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Fredoka:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #011408; /* Verde muy oscuro */
            overflow: hidden;
            color: white;
            font-family: 'Fredoka', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* FONDO INTERGALÁCTICO VERDE */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at top, #06361b 0%, #010a04 65%);
            z-index: -3;
        }

        .stars {
            position: fixed;
            inset: 0;
            background-image: radial-gradient(rgba(255,255,255,.8) 1px, transparent 1px);
            background-size: 45px 45px;
            opacity: .12;
            z-index: -2;
        }

        /* CONTENEDOR PRINCIPAL DIVIDIDO EN 2 */
        .layout-principal {
            display: flex;
            width: 95%;
            max-width: 1200px;
            height: 85vh;
            gap: 30px;
            z-index: 10;
        }

        /* PANEL IZQUIERDO: IMAGEN DEL AJOLOTE */
        .panel-izquierdo {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Animación de flotar */
        @keyframes flotar {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); filter: drop-shadow(0 10px 25px rgba(0, 255, 102, 0.6)); }
            100% { transform: translateY(0px); }
        }

        .ajolote-img {
            max-width: 80%;
            max-height: 80%;
            object-fit: contain;
            animation: flotar 3.5s ease-in-out infinite;
            filter: drop-shadow(0 0 15px rgba(0, 255, 102, 0.3));
            transition: opacity 0.3s ease;
        }

        /* PANEL DERECHO: EL CHAT */
        .panel-derecho {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: rgba(0, 0, 0, 0.55);
            border: 3px solid #00ff66; /* Verde Neón */
            border-radius: 20px;
            box-shadow: 0 0 20px rgba(0, 255, 102, 0.4);
            padding: 20px;
        }

        .chat-header {
            text-align: center;
            margin-bottom: 20px;
        }

        .chat-header h1 {
            font-family: 'Press Start 2P', cursive;
            font-size: 1.5rem;
            color: white;
            text-shadow: 0 0 10px white, 0 0 20px #00ff66;
            margin-bottom: 5px;
        }

        .chat-header .subtitle {
            font-family: 'Press Start 2P', cursive;
            color: #00ff66;
            font-size: 0.7rem;
        }

        /* ÁREA DE MENSAJES */
        .chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            background-color: rgba(0, 0, 0, 0.4);
            border-radius: 12px;
            border: 1px solid #1a5c32;
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Scrollbar personalizado */
        .chat-box::-webkit-scrollbar { width: 8px; }
        .chat-box::-webkit-scrollbar-track { background: transparent; }
        .chat-box::-webkit-scrollbar-thumb { background: #00ff66; border-radius: 4px; }

        .mensaje {
            padding: 12px 18px;
            border-radius: 15px;
            max-width: 85%;
            font-size: 1.1rem;
            line-height: 1.4;
        }

        .mensaje.user {
            background: rgba(0, 255, 102, 0.15);
            border: 2px solid #00ff66;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }

        .mensaje.bot {
            background: rgba(0, 0, 0, 0.6);
            border-left: 4px solid #00ff66;
            align-self: flex-start;
            border-bottom-left-radius: 2px;
        }

        .bot-name {
            font-family: 'Press Start 2P', cursive;
            font-size: 0.6rem;
            color: #00ff66;
            margin-bottom: 5px;
            display: block;
        }

        /* INPUT Y BOTÓN */
        .input-group {
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 15px;
            border-radius: 12px;
            border: 2px solid #1a5c32;
            background: rgba(0, 0, 0, 0.5);
            color: white;
            font-family: 'Fredoka', sans-serif;
            font-size: 1.1rem;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: #00ff66;
            box-shadow: 0 0 10px rgba(0, 255, 102, 0.3);
        }

        .play-btn {
            border: none;
            padding: 0 25px;
            border-radius: 12px;
            background: #00ff66;
            color: #011408;
            font-family: 'Fredoka', sans-serif;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: .3s;
            box-shadow: 0 0 15px rgba(0, 255, 102, 0.4);
        }

        .play-btn:hover {
            transform: scale(1.05);
            background: #00cc52;
            box-shadow: 0 0 25px #00ff66;
        }
        
        .loading { font-style: italic; color: #00ff66; display: none; font-size: 0.9rem; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="stars"></div>

    <div class="layout-principal">
        <!-- LADO IZQUIERDO: IMÁGENES -->
        <div class="panel-izquierdo">
            <img id="imgAjolote" class="ajolote-img" src="/static/ajo1.png" alt="Ajolote TUVCH">
        </div>

        <!-- LADO DERECHO: CHAT -->
        <div class="panel-derecho">
            <div class="chat-header">
                <h1>TASKTUVCH IA</h1>
                <div class="subtitle">CONEXIÓN LOCAL ESTABLECIDA</div>
            </div>
            
            <div class="chat-box" id="chatBox">
                <div class="mensaje bot">
                    <span class="bot-name">AJOLOTE TUVCH</span>
                    ¡Qué onda pa! Listo de volon pinpon para ayudarte con tus tareas. ¿Qué toca hoy?
                </div>
            </div>
            
            <div class="loading" id="loading">El ajolote está procesando datos...</div>
            
            <div class="input-group">
                <input type="text" id="userInput" placeholder="Ingresa tu consulta..." onkeypress="handleEnter(event)" autocomplete="off">
                <button class="play-btn" onclick="enviarMensaje()">ENVIAR</button>
            </div>
        </div>
    </div>

    <script>
        // Array con los nombres de las imágenes normales
        const imagenesNormales = [
            'ajo1.png', 'ajo2.png', 'ajo3.png', 
            'ajo4.png', 'ajo5.png', 'ajo6.png'
        ];
        const imagenPensando = 'ajothink.png';
        const imgElement = document.getElementById('imgAjolote');

        // Función para poner una imagen aleatoria al inicio y al responder
        function setImagenAleatoria() {
            const randomIndex = Math.floor(Math.random() * imagenesNormales.length);
            // Flask necesita que la ruta empiece con /static/
            imgElement.src = "/static/" + imagenesNormales[randomIndex]; 
        }

        // Se ejecuta al cargar la página
        window.onload = setImagenAleatoria;

        async function enviarMensaje() {
            const input = document.getElementById('userInput');
            const mensaje = input.value.trim();
            if (!mensaje) return;

            // 1. Mostrar mensaje del usuario
            agregarMensaje('user', mensaje);
            input.value = '';

            // 2. Cambiar estado a "Pensando"
            const loading = document.getElementById('loading');
            loading.style.display = 'block';
            imgElement.src = "/static/" + imagenPensando; // Cambia la imagen

            try {
                // Petición a Python
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mensaje: mensaje })
                });
                const data = await response.json();
                
                // 3. Respuesta recibida, restaurar estado
                loading.style.display = 'none';
                setImagenAleatoria(); // Vuelve a una imagen normal aleatoria
                agregarMensaje('bot', data.respuesta);
            } catch (error) {
                loading.style.display = 'none';
                setImagenAleatoria();
                agregarMensaje('bot', "Error en la matrix local. Revisa tu conexión a Python.");
            }
        }

        function agregarMensaje(tipo, texto) {
            const chatBox = document.getElementById('chatBox');
            const div = document.createElement('div');
            div.className = `mensaje ${tipo}`;
            
            if(tipo === 'bot') {
                div.innerHTML = `<span class="bot-name">AJOLOTE TUVCH</span>${texto}`;
            } else {
                div.textContent = texto;
            }
            
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function handleEnter(event) {
            if (event.key === 'Enter') enviarMensaje();
        }
    </script>
</body>
</html>
